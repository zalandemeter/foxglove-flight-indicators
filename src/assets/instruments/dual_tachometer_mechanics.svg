<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px"
    y="0px" width="400px" height="400px" viewBox="0 0 400 400" enable-background="new 0 0 400 400" xml:space="preserve">

  <style>
    .marks line {
      fill: none;
      stroke: white;
      stroke-linecap: butt; /* changed */
      stroke-miterlimit: 10;
      stroke-width: 2;
    }

    .wide-ticks line { stroke-width: 4; }
    .short-ticks line { stroke-width: 2; }

    .left .wide-ticks  line:nth-child(1) { transform: rotate(-45deg); }
    .left .wide-ticks  line:nth-child(2) { transform: rotate(-30deg); }
    .left .wide-ticks  line:nth-child(3) { transform: rotate(-15deg); }
    .left .wide-ticks  line:nth-child(4) { transform: rotate(0deg);   }
    .left .wide-ticks  line:nth-child(5) { transform: rotate(15deg);  }
    .left .wide-ticks  line:nth-child(6) { transform: rotate(30deg);  }
    .left .wide-ticks  line:nth-child(7) { transform: rotate(45deg);  }

    .left .short-ticks line:nth-child(1) { transform: rotate(-37.5deg); }
    .left .short-ticks line:nth-child(2) { transform: rotate(-22.5deg); }
    .left .short-ticks line:nth-child(3) { transform: rotate(-7.5deg);  }
    .left .short-ticks line:nth-child(4) { transform: rotate(7.5deg);   }
    .left .short-ticks line:nth-child(5) { transform: rotate(22.5deg);  }
    .left .short-ticks line:nth-child(6) { transform: rotate(37.5deg);  }
  </style>

  <!-- Background -->
  <circle cx="200" cy="200" r="163" fill="#232323"/>

  <!-- Color arcs -->
  <path d="M 170.1 162.5 A 145 145 0 0 0 161.4 138.7" fill="none" stroke="yellow" stroke-width="10"/>
  <path d="M 161.4 138.7 A 145 145 0 0 0 148.8 116.8" fill="none" stroke="green"  stroke-width="10"/>
  <path d="M 148.8 116.8 A 145 145 0 0 0 132.5  97.5" fill="none" stroke="red"    stroke-width="10"/>

  <path d="M 229.9 162.5 A 145 145 0 0 1 238.6 138.7" fill="none" stroke="yellow" stroke-width="10"/>
  <path d="M 238.6 138.7 A 145 145 0 0 1 251.2 116.8" fill="none" stroke="green"  stroke-width="10"/>
  <path d="M 251.2 116.8 A 145 145 0 0 1 267.5  97.5" fill="none" stroke="red"    stroke-width="10"/>

  <!-- Outer arcs -->
  <path d="M 135.2 308.138 A 150 150 0 0 0 135.2 91.862" fill="none" stroke="white" stroke-width="4"/>
  <path d="M 264.8 308.138 A 150 150 0 0 1 264.8 91.862" fill="none" stroke="white" stroke-width="4"/>

  <!-- Left tick marks -->
  <g class="marks left" transform="translate(30,200)">
    <g class="wide-ticks">
      <line x1="129" y1="0" x2="150" y2="0"/>
      <line x1="129" y1="0" x2="150" y2="0"/>
      <line x1="129" y1="0" x2="150" y2="0"/>
      <line x1="129" y1="0" x2="150" y2="0"/>
      <line x1="129" y1="0" x2="150" y2="0"/>
      <line x1="129" y1="0" x2="150" y2="0"/>
      <line x1="129" y1="0" x2="150" y2="0"/>
    </g>
    <g class="short-ticks">
      <line x1="135" y1="0" x2="150" y2="0"/>
      <line x1="135" y1="0" x2="150" y2="0"/>
      <line x1="135" y1="0" x2="150" y2="0"/>
      <line x1="135" y1="0" x2="150" y2="0"/>
      <line x1="135" y1="0" x2="150" y2="0"/>
      <line x1="135" y1="0" x2="150" y2="0"/>
    </g>
  </g>

  <!-- Right tick marks -->
  <g class="marks" transform="translate(370,200)">
    <g class="wide-ticks">
      <line x1="-150" y1="0" x2="-129" y2="0" transform="rotate(-45)"/>
      <line x1="-150" y1="0" x2="-129" y2="0" transform="rotate(-30)"/>
      <line x1="-150" y1="0" x2="-129" y2="0" transform="rotate(-15)"/>
      <line x1="-150" y1="0" x2="-129" y2="0" transform="rotate(0)"/>
      <line x1="-150" y1="0" x2="-129" y2="0" transform="rotate(15)"/>
      <line x1="-150" y1="0" x2="-129" y2="0" transform="rotate(30)"/>
      <line x1="-150" y1="0" x2="-129" y2="0" transform="rotate(45)"/>
    </g>
    <g class="short-ticks">
      <line x1="-150" y1="0" x2="-135" y2="0" transform="rotate(-37.5)"/>
      <line x1="-150" y1="0" x2="-135" y2="0" transform="rotate(-22.5)"/>
      <line x1="-150" y1="0" x2="-135" y2="0" transform="rotate(-7.5)"/>
      <line x1="-150" y1="0" x2="-135" y2="0" transform="rotate(7.5)"/>
      <line x1="-150" y1="0" x2="-135" y2="0" transform="rotate(22.5)"/>
      <line x1="-150" y1="0" x2="-135" y2="0" transform="rotate(37.5)"/>
    </g>
  </g>

  <!-- Labels -->
  <g fill="white" font-family="Noto Sans KR,sans-serif" font-size="18" font-weight="bold" text-anchor="middle" dominant-baseline="central">
    <text x="105.7" y="275.7">50</text>
    <text x="122.7" y="253.5">60</text>
    <text x="133.3" y="227.7">70</text>
    <text x="137.0" y="200.0">80</text>
    <text x="133.3" y="172.3">90</text>
    <text x="122.7" y="146.5">100</text>
    <text x="105.7" y="124.3">110</text>

    <text x="294.3" y="275.7">50</text>
    <text x="277.3" y="253.5">60</text>
    <text x="266.7" y="227.7">70</text>
    <text x="263.0" y="200.0">80</text>
    <text x="266.7" y="172.3">90</text>
    <text x="277.3" y="146.5">100</text>
    <text x="294.3" y="124.3">110</text>
  </g>

  <!-- Divider -->
  <line x1="200" y1="40" x2="200" y2="360" stroke="#333" stroke-width="2"/>

  <!-- TOP Label -->
  <text x="200" y="80" fill="white" font-family="Noto Sans KR,sans-serif" font-size="22" font-weight="bold" text-anchor="middle" dominant-baseline="central">TACH</text>

  <!-- BOTTOM Label -->
  <text x="200" y="320" fill="white" font-family="Noto Sans KR,sans-serif" font-size="22" font-weight="bold" text-anchor="middle" dominant-baseline="central">% RPM</text>

   <!-- RIGHT/LEFT Labels -->
  <text x="100" y="200" fill="white" font-family="Noto Sans KR,sans-serif" font-size="22"
        font-weight="bold" text-anchor="middle" dominant-baseline="middle">E</text>
  <text x="300" y="200" fill="white" font-family="Noto Sans KR,sans-serif" font-size="22"
        font-weight="bold" text-anchor="middle" dominant-baseline="middle">R</text>


</svg>
