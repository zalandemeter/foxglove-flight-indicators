<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px"
    y="0px" width="400px" height="400px" viewBox="0 0 400 400" enable-background="new 0 0 400 400" xml:space="preserve">

  <!-- White arm: tapers from x=50 (height 7) to tip at x=162 -->
  <polygon
    fill="#FFFFFF"
    stroke="#B2B2B2"
    stroke-width="0.5"
    stroke-miterlimit="10"
    points="50,196.5 155,197 162,200 155,203 50,203.5"
  />

  <!-- Gray trapezoid base: right edge matches arm height (8px), fans out to left (16px) -->
  <polygon
    fill="#232323"
    stroke="#353535"
    stroke-width="0.5"
    stroke-miterlimit="10"
    points="45,192 70,196 70,204 45,208"
  />

</svg>
